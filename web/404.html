<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 - AgentShield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--ink:#e8e6df;--muted:rgba(232,230,223,.45);--lime:#c4f135;--mono:"JetBrains Mono",ui-monospace,monospace;--border:rgba(255,255,255,.08)}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;position:relative;overflow:hidden}
body::before{content:'';position:fixed;width:600px;height:500px;top:-200px;left:50%;transform:translateX(-50%);background:radial-gradient(ellipse,rgba(196,241,53,.05) 0%,transparent 60%);pointer-events:none}
.shield{font-size:48px;margin-bottom:24px;opacity:.6}
.code{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--lime);background:rgba(196,241,53,.08);border:1px solid rgba(196,241,53,.2);padding:4px 12px;border-radius:20px;margin-bottom:20px;display:inline-block}
h1{font-size:clamp(36px,6vw,72px);font-weight:800;letter-spacing:-.04em;line-height:.95;margin-bottom:16px}
p{color:var(--muted);font-size:15px;max-width:380px;line-height:1.7;margin-bottom:36px}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-lime{background:var(--lime);color:#000;padding:11px 24px;font-weight:700;font-size:12.5px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em;text-decoration:none;transition:opacity .12s}
.btn-lime:hover{opacity:.85}
.btn-ghost{background:transparent;color:rgba(255,255,255,.5);border:1px solid var(--border);padding:11px 22px;font-size:12.5px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;text-decoration:none;transition:all .12s}
.btn-ghost:hover{color:var(--ink);border-color:rgba(255,255,255,.22)}
.hint{margin-top:48px;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.18);letter-spacing:.06em}
</style>
</head>
<body>
<div class="shield">⛨</div>
<span class="code">Error 404</span>
<h1>Page not<br>found.</h1>
<p>The page you're looking for doesn't exist or has moved. Your AI agents are still protected.</p>
<div class="actions">
  <a class="btn-lime" href="/app">Open dashboard →</a>
  <a class="btn-ghost" href="/">Back to home</a>
</div>
<div class="hint">AGENTSHIELD · SECURITY LLM PLATFORM</div>
</body>
</html>
